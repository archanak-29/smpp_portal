{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h2>Dashboard</h2>
    <p class="muted">Overview of your SMS activity.</p>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-title">SMS Sent Today</div>
    <div class="stat-value" id="sms-sent-today">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-title">Delivery Rate</div>
    <div class="stat-value" id="delivery-rate">0%</div>
  </div>
  <div class="stat-card">
    <div class="stat-title">Balance Remaining</div>
    <div class="stat-value" id="balance-remaining">0</div>
  </div>
</div>

<div class="card table-card" style="margin-top: 2rem;">
  <div class="table-head">
    <div>
      <h3>Recent Activity</h3>
      <p class="muted">Your most recent sent messages or actions.</p>
    </div>
  </div>
  <div class="table-wrap">
    <table class="table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Type</th>
          <th>Details</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="recent-activity-body">
        <tr>
          <td colspan="4" class="table-muted">No recent activity found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
